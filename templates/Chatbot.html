<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC Legal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-0.5rem); }
        }
        .animate-bounce-1 { animation: bounce 1s infinite 0ms; }
        .animate-bounce-2 { animation: bounce 1s infinite 150ms; }
        .animate-bounce-3 { animation: bounce 1s infinite 300ms; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen">
    <!-- Header -->
    <div class="bg-slate-900/80 backdrop-blur-sm border-b border-slate-700 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white">IPC Legal Assistant</h1>
                    <p class="text-sm text-slate-400">Indian Penal Code Expert</p>
                </div>
            </div>
            <button onclick="clearChat()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
                Clear
            </button>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="max-w-5xl mx-auto px-4 py-6">
        <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700 shadow-2xl overflow-hidden flex flex-col" style="height: calc(100vh - 200px);">
            
            <!-- Messages -->
            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="flex justify-start">
                    <div class="max-w-3xl rounded-2xl px-5 py-3 bg-slate-700 text-slate-100">
                        <p class="whitespace-pre-wrap leading-relaxed">Hello! I'm your Legal Assistant specialized in the Indian Penal Code. How can I help you today?</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-slate-800/80 border-t border-slate-700">
                <div class="flex gap-3">
                    <input
                        type="text"
                        id="userInput"
                        placeholder="Ask about IPC sections, legal definitions, penalties..."
                        class="flex-1 bg-slate-900 text-slate-100 placeholder-slate-500 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                        onkeypress="handleKeyPress(event)"
                    />
                    <button
                        id="sendButton"
                        onclick="sendMessage()"
                        class="bg-amber-500 hover:bg-amber-600 text-slate-900 rounded-xl px-6 py-3 flex items-center gap-2 transition-colors font-semibold"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                        Send
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="mt-4 text-center text-slate-500 text-sm">
            <p>This assistant provides information based on the Indian Penal Code. Always consult a qualified legal professional for legal advice.</p>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        let isLoading = false;

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            let bgClass, textClass;
            if (role === 'user') {
                bgClass = 'bg-amber-500';
                textClass = 'text-slate-900';
            } else if (role === 'error') {
                bgClass = 'bg-red-500/20 border border-red-500/30';
                textClass = 'text-red-300';
            } else {
                bgClass = 'bg-slate-700';
                textClass = 'text-slate-100';
            }
            
            let errorIcon = '';
            if (role === 'error') {
                errorIcon = `
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="font-semibold text-sm">Error</span>
                    </div>
                `;
            }
            
            messageDiv.innerHTML = `
                <div class="max-w-3xl rounded-2xl px-5 py-3 ${bgClass} ${textClass}">
                    ${errorIcon}
                    <p class="whitespace-pre-wrap leading-relaxed">${content}</p>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.className = 'flex justify-start';
            loadingDiv.innerHTML = `
                <div class="bg-slate-700 rounded-2xl px-5 py-3">
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce-1"></div>
                            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce-2"></div>
                            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce-3"></div>
                        </div>
                        <span class="text-slate-400 text-sm">Analyzing legal context...</span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(loadingDiv);
            scrollToBottom();
        }

        function hideLoading() {
            const loadingDiv = document.getElementById('loading');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isLoading) return;

            // Add user message
            addMessage('user', message);
            userInput.value = '';
            
            // Disable input
            isLoading = true;
            userInput.disabled = true;
            sendButton.disabled = true;
            sendButton.classList.add('opacity-50', 'cursor-not-allowed');
            
            // Show loading
            showLoading();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                hideLoading();
                
                if (response.ok) {
                    addMessage('assistant', data.response);
                } else {
                    addMessage('error', data.error || 'Failed to get response. Please try again.');
                }
            } catch (error) {
                hideLoading();
                addMessage('error', 'Network error. Please check your connection and try again.');
                console.error('Error:', error);
            } finally {
                // Re-enable input
                isLoading = false;
                userInput.disabled = false;
                sendButton.disabled = false;
                sendButton.classList.remove('opacity-50', 'cursor-not-allowed');
                userInput.focus();
            }
        }

        function clearChat() {
            messagesDiv.innerHTML = `
                <div class="flex justify-start">
                    <div class="max-w-3xl rounded-2xl px-5 py-3 bg-slate-700 text-slate-100">
                        <p class="whitespace-pre-wrap leading-relaxed">Hello! I'm your Legal Assistant specialized in the Indian Penal Code. How can I help you today?</p>
                    </div>
                </div>
            `;
        }

        // Focus input on load
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
